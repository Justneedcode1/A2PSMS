<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS SaaS Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f5f5f5; 
        }
        
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px;
            width: 100%;
            max-width: 450px;
        }
        
        h1 {
            text-align: center;
            color: #3B82F6;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #1F2937;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #1E40AF;
        }
        
        .toggle {
            text-align: center;
            margin-top: 20px;
            color: #6B7280;
            font-size: 14px;
        }
        
        .toggle a {
            color: #3B82F6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        
        .toggle a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .message.show {
            display: block;
        }
        
        .message.error {
            background: #FEE2E2;
            color: #DC2626;
            border: 1px solid #FECACA;
        }
        
        .message.success {
            background: #DCFCE7;
            color: #16A34A;
            border: 1px solid #BBF7D0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h1>📱 SMS SaaS</h1>
        <p class="subtitle">Send SMS Easily & Affordably</p>
        
        <div id="message" class="message"></div>
        
        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h2>Login</h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()">Login</button>
            <div class="toggle">
                Don't have an account? <a onclick="toggleForms()">Sign Up</a>
            </div>
        </div>
        
        <!-- SIGNUP FORM -->
        <div id="signupForm" class="hidden">
            <h2>Create Account</h2>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="John">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="••••••••" minlength="8">
            </div>
            <button onclick="handleSignup()">Sign Up</button>
            <div class="toggle">
                Already have an account? <a onclick="toggleForms()">Login</a>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleForms() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('signupForm').classList.toggle('hidden');
        clearMessage();
    }
    
    function showMessage(text, isError = false) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = 'message show ' + (isError ? 'error' : 'success');
        setTimeout(() => clearMessage(), 4000);
    }
    
    function clearMessage() {
        const msg = document.getElementById('message');
        msg.className = 'message';
        msg.textContent = '';
    }
    
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showMessage('Please fill in all fields', true);
            return;
        }
        
        showMessage('Logging in...');
    }
    
    function handleSignup() {
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        
        if (!firstName || !lastName || !email || !password) {
            showMessage('Please fill in all fields', true);
            return;
        }
        
        if (password.length < 8) {
            showMessage('Password must be at least 8 characters', true);
            return;
        }
        
        showMessage('Creating account...');
    }
</script>

</body>
</html>
